# Grafana Loki deployment for aggregating OTLP logs from the OTel Collector.
#
# Loki 3.x natively supports OTLP ingestion on port 3100 at /otlp/v1/logs.
# The OTel Collector forwards logs via its otlphttp exporter.
#
# This is a single-binary demo deployment with ephemeral filesystem storage.
# Not suitable for production — use the Loki Helm chart for real deployments.
#
# Prerequisites:
# - monarch-tests namespace created
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: monarch-tests
data:
  config.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    common:
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: inmemory
      replication_factor: 1
      path_prefix: /loki/data

    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    storage_config:
      filesystem:
        directory: /loki/chunks

    limits_config:
      allow_structured_metadata: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: monarch-tests
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
        - name: loki
          image: grafana/loki:3.4.2
          args: ["-config.file=/etc/loki/config.yaml"]
          ports:
            - containerPort: 3100
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/loki
      volumes:
        - name: config
          configMap:
            name: loki-config
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: monarch-tests
spec:
  selector:
    app: loki
  ports:
    - name: http
      port: 3100
      targetPort: 3100
