# OpenTelemetry Collector deployment for receiving Monarch metrics and logs.
#
# Receives OTLP/HTTP on port 4318 and exports via:
# - debug exporter (logs metrics and log records to stdout for verification)
# - prometheus exporter (exposes /metrics on port 8889 for scraping)
# - otlphttp/loki exporter (forwards logs to Grafana Loki for aggregation)
#
# Prerequisites:
# - monarch-tests namespace created
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: monarch-tests
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          http:
            endpoint: "0.0.0.0:4318"

    processors:
      batch:
        timeout: 5s
        send_batch_size: 1024

    exporters:
      debug:
        verbosity: detailed
      prometheus:
        endpoint: "0.0.0.0:8889"
      otlphttp/loki:
        endpoint: "http://loki.monarch-tests.svc.cluster.local:3100/otlp"

    service:
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug, prometheus]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug, otlphttp/loki]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: monarch-tests
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: collector
          image: otel/opentelemetry-collector-contrib:0.120.0
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - containerPort: 4318
              name: otlp-http
            - containerPort: 8889
              name: prometheus
          volumeMounts:
            - name: config
              mountPath: /etc/otel
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: monarch-tests
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: prometheus
      port: 8889
      targetPort: 8889
