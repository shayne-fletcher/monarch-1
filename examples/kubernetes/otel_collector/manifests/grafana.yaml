# Grafana deployment with Prometheus and Loki datasources pre-configured.
#
# UI is exposed on port 3000. Port-forward to view dashboards:
#   kubectl port-forward -n monarch-tests svc/grafana 3000:3000
#   open http://localhost:3000
#
# Default credentials: admin / admin (no authentication enforced).
#
# Prerequisites:
# - monarch-tests namespace created
# - otel-collector, loki deployed
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monarch-tests
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://otel-collector.monarch-tests.svc.cluster.local:8889
        isDefault: true
        editable: true
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monarch-tests.svc.cluster.local:3100
        editable: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monarch-tests
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.6.0
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Admin"
            - name: GF_AUTH_DISABLE_LOGIN_FORM
              value: "true"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monarch-tests
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
