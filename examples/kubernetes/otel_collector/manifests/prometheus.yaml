# Prometheus server that scrapes metrics from the OTEL collector.
#
# The collector exposes a Prometheus scrape endpoint on port 8889.
# This Prometheus instance scrapes it and provides the query API
# that Grafana's Prometheus datasource requires.
#
# Prerequisites:
# - monarch-tests namespace created
# - otel-collector deployed
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monarch-tests
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    scrape_configs:
      - job_name: otel-collector
        static_configs:
          - targets: ["otel-collector.monarch-tests.svc.cluster.local:8889"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monarch-tests
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v3.3.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=1h"
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monarch-tests
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
