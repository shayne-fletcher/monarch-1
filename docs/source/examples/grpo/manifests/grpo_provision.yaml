# Controller manifest for Python-native MonarchMesh provisioning (GRPO example).
#
# The Python script creates MonarchMesh CRDs via the K8s API using --provision.
# No worker pod YAML manifests are needed.
#
# Prerequisites:
# - Kubernetes cluster with Monarch operator installed
# - GPU nodes with nvidia.com/gpu resources available
---
apiVersion: v1
kind: Namespace
metadata:
  name: monarch-tests
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grpo-controller
  namespace: monarch-tests
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: grpo-controller
  namespace: monarch-tests
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["monarch.pytorch.org"]
    resources: ["monarchmeshes"]
    verbs: ["create", "get", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grpo-controller
  namespace: monarch-tests
subjects:
  - kind: ServiceAccount
    name: grpo-controller
    namespace: monarch-tests
roleRef:
  kind: Role
  name: grpo-controller
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Pod
metadata:
  name: grpo-controller
  namespace: monarch-tests
spec:
  containers:
    - name: controller
      image: ghcr.io/meta-pytorch/monarch:latest
      # DEMONSTRATION ONLY: install ``datasets`` at container startup.
      # Production controllers should bake dependencies into a custom
      # image and stage datasets onto a persistent volume -- see the
      # matching note above ``_PIP_INSTALL`` in ``kubernetes_grpo.py``.
      command: ["/bin/sh", "-c"]
      args:
        - |
          pip install --quiet --break-system-packages datasets && \
          sleep infinity
      # Mark the pod Ready only once ``datasets`` is importable, so a
      # subsequent ``kubectl wait --for=condition=Ready`` does not race
      # the pip install.
      readinessProbe:
        exec:
          command: ["python", "-c", "import datasets"]
        initialDelaySeconds: 5
        periodSeconds: 3
        timeoutSeconds: 3
        failureThreshold: 60
  serviceAccountName: grpo-controller
