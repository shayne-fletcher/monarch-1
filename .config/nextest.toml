[profile.default]
# All tests timeout after 5 minutes.
slow-timeout = { period = "30s", terminate-after = 10 }

[profile.ci]
# Do not cancel the test run on the first failure.
fail-fast = false
# Cap parallelism to reduce contention-induced timeouts on shared CI runners.
test-threads = 4

[profile.ci.junit]
path = "junit.xml"
