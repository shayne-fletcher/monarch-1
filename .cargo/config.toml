[build]
rustflags = [
    "--cfg",
    "tracing_unstable",
    # Declare the opt-in verification cfg used by hyperactor's Send/Sync
    # shortcuts (see hyperactor/src/proc.rs) so it is not flagged as an
    # unexpected cfg in ordinary builds.
    "--check-cfg",
    "cfg(hyperactor_verify_auto_traits)",
    # Mirror fbsource-common.bcfg [rust] allow_lints so `cargo clippy`
    # surfaces the same lint set as `arc rust-clippy`. Lints re-enabled
    # in monarch's PACKAGE via `-W` are intentionally omitted from this
    # list so cargo flags them too. Keep in sync with that file.
    "-Aclippy::almost_swapped",
    "-Aclippy::approx_constant",
    "-Aclippy::bool_to_int_with_if",
    "-Aclippy::cognitive_complexity",
    "-Aclippy::derive_partial_eq_without_eq",
    "-Aclippy::disallowed_names",
    "-Aclippy::doc_markdown",
    "-Aclippy::enum_variant_names",
    "-Aclippy::filter_map_identity",
    "-Aclippy::implicit_hasher",
    "-Aclippy::inefficient_to_string",
    "-Aclippy::let_underscore_untyped",
    "-Aclippy::let_unit_value",
    "-Aclippy::manual_flatten",
    "-Aclippy::manual_range_contains",
    "-Aclippy::manual_slice_size_calculation",
    "-Aclippy::match_bool",
    "-Aclippy::match_like_matches_macro",
    "-Aclippy::module_inception",
    "-Aclippy::must_use_candidate",
    "-Aclippy::mutable_key_type",
    "-Aclippy::needless_collect",
    "-Aclippy::needless_update",
    "-Aclippy::new_ret_no_self",
    "-Aclippy::new_without_default",
    "-Aclippy::not_unsafe_ptr_arg_deref",
    "-Aclippy::option_option",
    "-Aclippy::single_match",
    "-Aclippy::string_lit_as_bytes",
    "-Aclippy::too_many_arguments",
    "-Aclippy::trivially_copy_pass_by_ref",
    "-Aclippy::type_complexity",
    "-Aclippy::uninlined_format_args",
    "-Aclippy::unit_arg",
    "-Aclippy::unnecessary_wraps",
    "-Aclippy::unneeded_field_pattern",
    "-Aclippy::unreadable_literal",
    "-Aclippy::useless_let_if_seq",
    "-Aclippy::vec_init_then_push",
    "-Aclippy::write_with_newline",
    "-Aclippy::wrong_self_convention",
    "-Amismatched_lifetime_syntaxes",
    "-Asuspicious_double_ref_op",
    "-Aunused_braces",
    "-Astable_features"
]
