name: Test GPU Python

on:
  workflow_call:

concurrency:
  group: test-gpu-python-${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_number || github.ref }}
  cancel-in-progress: true

jobs:
  set-matrix:
    uses: ./.github/workflows/set-matrix.yaml

  test-gpu-python:
    name: Test GPU Python (${{ matrix.name }}-py3.10)
    needs: set-matrix
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-matrix.outputs.test-matrix) }}
    with:
      timeout: 120
      runner: ${{ matrix.runner }}
      gpu-arch-type: ${{ matrix.gpu-arch-type }}
      gpu-arch-version: ${{ matrix.gpu-arch-version }}
      submodules: recursive
      download-artifact: monarch-${{ matrix.name }}-${{ github.sha }}-py3.10
      script: |
        # Source common setup functions
        source scripts/common-setup.sh

        # Fetch tests disabled via GitHub issues titled "DISABLED <test-name>".
        # Writes disabled_tests.txt (read by conftest.py).
        python3 scripts/fetch_disabled_tests.py

        # Setup test environment
        setup_test_environment

        # Setup Tensor Engine dependencies
        setup_tensor_engine

        # Setup environment based on GPU type
        if [[ "${{ matrix.gpu-arch-type }}" == "cuda" ]]; then
          setup_cuda_environment
        elif [[ "${{ matrix.gpu-arch-type }}" == "rocm" ]]; then
          setup_rocm_environment
        fi

        # Install torch nightly before installing the wheel,
        # so that we can test the wheel against the latest nightly
        pip install ${{ matrix.torch-spec }}

        # Install the built wheel from artifact
        install_wheel_from_artifact

        # tests the type_assert statements in test_python_actor are correct
        # pyre currently does not check these assertions
        pyright python/tests/test_python_actors.py

        # Run GPU Python tests split into 10 groups sequentially
        # Each group runs separately with process cleanup in between
        pip install pytest-split

        run_test_groups

        # TODO(meriksen): temporarily disabled to unblock lands while debugging
        # mock CUDA issues on the OSS setup
        # python python/tests/test_mock_cuda.py
