name: Build monarch wheels and docker image without publishing

on:
  workflow_call:
    inputs:
      artifact-name:
        description: 'Wheel artifact name from build workflow'
        required: true
        type: string

jobs:
  build-docker:
    name: Build docker container
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # This step is required to avoid the "no space left on device" error from
      # the large pytorch docker image.
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1

      - name: Checkout repository
        uses: actions/checkout@v6

      # Use the already built and tested wheels.
      # Download wheels outside the repo so they don't interfere with the
      # Docker build context (dist/ is in .dockerignore).
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ runner.temp }}/monarch_wheels

      - name: List downloaded artifacts
        run: |
          echo "Contents of wheels directory:"
          ls -la ${{ runner.temp }}/monarch_wheels/

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: . # Build context is the root directory
          file: ./Dockerfile.nightly
          push: false # Just building the image, not publishing
          build-args: |
            PYTORCH_TAG=2.12.0.dev20260324-cuda12.8-cudnn9-runtime
          build-contexts: |
            monarch-wheels=${{ runner.temp }}/monarch_wheels
          outputs: type=docker,dest=${{ runner.temp }}/monarch_image.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: monarch-image
          path: ${{ runner.temp }}/monarch_image.tar
