name: Test CPU Python (macOS)

on:
  workflow_call:
    inputs:
      artifact-name:
        description: 'Wheel artifact name from build workflow'
        required: true
        type: string
      python-version:
        description: 'Python version to test with'
        type: string
        default: '3.10'
      runner:
        description: 'macOS runner to use for the test'
        type: string
        default: 'macos-latest'

concurrency:
  group: test-cpu-python-macos-${{ inputs.runner }}-${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_number || github.ref }}
  cancel-in-progress: true

jobs:
  test-cpu-python-macos:
    name: Test CPU Python - Tensor Engine (macOS)
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install macOS test dependencies
        shell: bash
        run: |
          set -eux
          source scripts/common-setup-macos.sh
          install_macos_base_dependencies
          install_macos_python_test_dependencies
          python -m pip install pytest-split

      - name: Fetch disabled tests
        shell: bash
        run: |
          set -eux
          python3 scripts/fetch_disabled_tests.py

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ runner.temp }}/wheel-artifact

      - name: Install wheel
        shell: bash
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/cargo-target
        run: |
          set -eux
          python -m pip install "${{ runner.temp }}/wheel-artifact"/*.whl

      - name: Verify import
        shell: bash
        run: |
          set -eux
          python -c "import monarch; import monarch.actor; print('Monarch imported successfully')"

      - name: Run macOS CPU Python tests
        shell: bash
        run: |
          set -eux
          source scripts/common-setup-macos.sh
          run_test_groups
