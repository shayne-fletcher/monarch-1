name: Build Monarch Wheels

on:
  workflow_call:
    inputs:
      python-versions:
        description: 'JSON array of Python versions to build (e.g., ["3.10", "3.11", "3.12", "3.13"])'
        type: string
        default: '["3.10", "3.11", "3.12", "3.13"]'
      torch-spec:
        description: 'Torch installation specification'
        type: string
        default: '--pre torch --extra-index-url https://download.pytorch.org/whl/nightly/cu128'
      gpu-arch-type:
        description: 'GPU architecture type'
        type: string
        default: 'cuda'
      gpu-arch-version:
        description: 'GPU architecture version'
        type: string
        default: '12.8'
      runner:
        description: 'Runner to use for the build'
        type: string
        default: 'linux.g5.4xlarge.nvidia.gpu'
      docker-image:
        description: 'Docker image to use (default lets test-infra auto-select based on gpu-arch)'
        type: string
        default: 'pytorch/almalinux-builder'
      version:
        description: 'Version string for the wheel (default: $current_version.dev<date>)'
        type: string
        default: ''
      platform:
        description: 'Target platform architecture (e.g., x86_64, aarch64)'
        type: string
        default: 'x86_64'
      timeout:
        description: 'Job timeout in minutes'
        type: number
        default: 60

jobs:
  build:
    name: ${{ inputs.gpu-arch-type }}${{ inputs.gpu-arch-version }}-py${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(inputs.python-versions) }}
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    with:
      timeout: ${{ inputs.timeout }}
      runner: ${{ inputs.runner }}
      docker-image: ${{ inputs.docker-image }}
      gpu-arch-type: ${{ inputs.gpu-arch-type }}
      gpu-arch-version: ${{ inputs.gpu-arch-version }}
      submodules: recursive
      upload-artifact: monarch-py${{ matrix.python-version }}-${{ inputs.gpu-arch-type }}${{ inputs.gpu-arch-version }}-${{ inputs.platform }}
      script: |
        source scripts/common-setup.sh
        setup_build_environment ${{ matrix.python-version }}

        # Install torch before building the wheel
        pip install ${{ inputs.torch-spec }}
        pip install -r build-requirements.txt

        # Setup Tensor Engine dependencies
        setup_tensor_engine

        # Install CUDA toolkit if not already present (ARM64 runners lack GPU/CUDA)
        if ! command -v nvcc &> /dev/null; then
            setup_cuda_toolkit
        fi

        cargo install --path monarch_hyperactor

        # Build dashboard frontend (if Node.js is available)
        FRONTEND_DIR="python/monarch/monarch_dashboard/frontend"
        if [ -d "$FRONTEND_DIR" ]; then
          if command -v npm &> /dev/null; then
            echo "Building dashboard frontend..."
            (cd "$FRONTEND_DIR" && npm ci && npm run build)
          else
            echo "npm not found, skipping frontend build"
          fi
        fi

        # Build wheel
        if [ -n "${{ inputs.version }}" ]; then
          export MONARCH_VERSION="${{ inputs.version }}"
        else
          export MONARCH_VERSION=0.5.0.dev$(date +'%Y%m%d')
        fi
        python setup.py bdist_wheel

        echo "=== sccache stats ==="
        sccache --show-stats || true
        echo "=== end sccache stats ==="

        # Rename to manylinux2014 for PyPI compatibility
        for f in dist/*linux_*.whl; do
            mv "$f" "$(echo "$f" | sed 's/linux_/manylinux2014_/')"
        done
        ls -la dist/

        # Verify the wheel can be installed and imported
        install_python_test_dependencies
        pip install dist/*.whl
        python -c "import monarch"
