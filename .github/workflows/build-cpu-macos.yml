name: Build CPU (macOS)

on:
  workflow_call:
    inputs:
      artifact-name:
        description: 'Wheel artifact name to upload'
        type: string
        default: 'monarch-cpu-macos-py3.10'
      python-version:
        description: 'Python version to build with'
        type: string
        default: '3.10'
      runner:
        description: 'macOS runner to use for the build'
        type: string
        default: 'macos-latest'

concurrency:
  group: build-cpu-macos-${{ inputs.runner }}-${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_number || github.ref }}
  cancel-in-progress: true

jobs:
  build-cpu-macos:
    name: Build CPU - Tensor Engine (macOS)
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set up Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install macOS build dependencies
        shell: bash
        run: |
          set -eux
          export HOMEBREW_NO_AUTO_UPDATE=1
          brew install protobuf

      - name: Build CPU wheel
        shell: bash
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/cargo-target
          USE_TENSOR_ENGINE: "1"
        run: |
          set -eux
          python -m pip install --upgrade pip
          python -m pip install --upgrade "setuptools>=77" wheel
          python -m pip install -r build-requirements.txt
          python -m pip install --pre torch --extra-index-url https://download.pytorch.org/whl/nightly/cpu
          python setup.py bdist_wheel

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: dist/*.whl
          if-no-files-found: error
