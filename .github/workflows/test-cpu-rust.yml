name: Test CPU Rust

on:
  workflow_call:

concurrency:
  group: test-cpu-rust-${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_number || github.ref }}
  cancel-in-progress: true

jobs:
  test-cpu-rust:
    name: Test CPU Rust (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64
            runner: linux.4xlarge
            docker-image: pytorch/almalinux-builder
            cargo-jobs: 16
          - name: arm64
            runner: linux.arm64.m8g.4xlarge
            docker-image: pytorch/manylinuxaarch64-builder:cuda13.2
            cargo-jobs: 8
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    with:
      timeout: 120
      runner: ${{ matrix.runner }}
      docker-image: ${{ matrix.docker-image }}
      submodules: recursive
      upload-artifact: test-results-cpu-rust-${{ matrix.name }}-${{ github.sha }}
      script: |
        # Source common setup functions
        source scripts/common-setup.sh

        # Fetch tests disabled via GitHub issues titled "DISABLED <test-name>".
        # Writes disabled_tests.txt and patches .config/nextest.toml with a filter.
        python3 scripts/fetch_disabled_tests.py

        # Setup test environment
        setup_test_environment

        # Install Rust
        setup_rust_toolchain

        # Install System dependencies
        install_system_dependencies

        # Install PyTorch (needed for ABI compatibility, no GPU required)
        pip install --pre torch --extra-index-url https://download.pytorch.org/whl/nightly/cu132

        # Run CPU-safe Rust tests (no GPU hardware available)
        echo "=== Runner spec ==="
        lscpu | grep -E '^(Architecture|Model name|CPU\(s\)):' || true
        free -h || true
        echo "=== end runner spec ==="
        echo "Running CPU Rust tests..."
        # The CI profile is configured in .config/nextest.toml
        # It includes individual test timeouts and a timeout for the entire test run.
        # Capture the test exit code so stage_test_artifacts still runs on
        # failure (otherwise set -e would exit before any artifacts are
        # uploaded). Exclude crates that require GPU hardware, CUDA libraries,
        # or torch C++ headers (libtorch) not available on CPU-only runners.
        rc=0
        # CI disables the Send/Sync shortcut impls so rustc verifies the
        # underlying auto-trait bounds structurally.
        CARGO_BUILD_JOBS=${{ matrix.cargo-jobs }} \
          RUSTFLAGS="${RUSTFLAGS:-} --cfg hyperactor_verify_auto_traits" \
          cargo nextest run --locked --workspace --profile ci \
          -E "$(cat .config/nextest-filter.txt)" \
          --exclude monarch_messages \
          --exclude monarch_tensor_worker \
          --exclude torch-sys-cuda \
          --exclude monarch_rdma \
          --exclude torch-sys \
          --exclude nccl-sys \
          --exclude rdmaxcel-sys \
          --exclude monarch_cpp_static_libs \
          --exclude monarch_extension \
          --exclude monarch_bench \
          --exclude monarch_conda || rc=$?

        echo "=== sccache stats ==="
        sccache --show-stats || true
        echo "=== end sccache stats ==="

        stage_test_artifacts
        exit $rc
