name: Test GPU Rust

on:
  workflow_call:

concurrency:
  group: test-gpu-rust-${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_number || github.ref }}
  cancel-in-progress: true

jobs:
  set-matrix:
    uses: ./.github/workflows/set-matrix.yaml

  test-gpu-rust:
    name: Test GPU Rust (${{ matrix.name }}-py3.10)
    needs: set-matrix
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-matrix.outputs.test-matrix) }}
    with:
      timeout: 120
      runner: ${{ matrix.runner }}
      gpu-arch-type: ${{ matrix.gpu-arch-type }}
      gpu-arch-version: ${{ matrix.gpu-arch-version }}
      submodules: recursive
      download-artifact: monarch-${{ matrix.name }}-${{ github.sha }}-py3.10
      upload-artifact: test-results-gpu-rust-${{ matrix.name }}-${{ github.sha }}
      script: |
        # Source common setup functions
        source scripts/common-setup.sh

        # Fetch tests disabled via GitHub issues titled "DISABLED <test-name>".
        # Writes disabled_tests.txt and patches .config/nextest.toml with a filter.
        python3 scripts/fetch_disabled_tests.py

        # Setup test environment
        setup_test_environment

        # Install Rust
        setup_rust_toolchain

        # Install System dependencies
        install_system_dependencies

        # Setup Tensor Engine dependencies
        setup_tensor_engine

        # Setup environment based on GPU type
        if [[ "${{ matrix.gpu-arch-type }}" == "cuda" ]]; then
          setup_cuda_environment
        elif [[ "${{ matrix.gpu-arch-type }}" == "rocm" ]]; then
          setup_rocm_environment
        fi

        # Setup PyTorch with C++ headers using common-setup utility
        setup_pytorch_with_headers "${{ matrix.gpu-arch-type }}" "${{ matrix.gpu-arch-version }}" "${{ matrix.torch-spec }}"

        # Run GPU Rust tests
        echo "Running OSS Rust tests..."
        # Uses cargo nextest to run tests in separate processes, which better matches
        # internal buck test behavior.
        # The CI profile is configured in .config/nextest.toml
        # It includes individual test timeouts and a timeout for the entire test run.
        # Exclude filter is for packages that don't build in Github Actions yet.
        # * monarch_messages: monarch/target/debug/deps/monarch_messages-...:
        #   /lib64/libm.so.6: version `GLIBC_2.29' not found
        #   (required by /meta-pytorch/monarch/libtorch/lib/libtorch_cpu.so)
        # Capture the test exit code so stage_test_artifacts still runs on
        # failure (otherwise set -e would exit before any artifacts are
        # uploaded).
        rc=0
        # CI disables the Send/Sync shortcut impls so rustc verifies the
        # underlying auto-trait bounds structurally.
        RUSTFLAGS="${RUSTFLAGS:-} --cfg hyperactor_verify_auto_traits" \
          cargo nextest run --locked --workspace --profile ci \
          -E "$(cat .config/nextest-filter.txt)" \
          --exclude monarch_messages \
          --exclude monarch_tensor_worker \
          --exclude torch-sys-cuda \
          --exclude monarch_rdma \
          --exclude torch-sys || rc=$?

        echo "=== sccache stats ==="
        sccache --show-stats || true
        echo "=== end sccache stats ==="

        # NOTE: We deliberately do NOT copy nextest's junit.xml into
        # RUNNER_TEST_RESULTS_DIR. pytest-results-action chokes on it with
        # "TypeError: results.testsuites.testsuite.testcase is not iterable".
        # stage_test_artifacts uploads it under a separate name instead.
        stage_test_artifacts
        exit $rc
