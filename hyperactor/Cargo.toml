# @generated by autocargo from //monarch/hyperactor:[channel_benchmarks,hyperactor,hyperactor-example-channel,hyperactor-example-derive,hyperactor-example-pingpong,hyperactor-example-stream,hyperactor_host_test_bootstrap]

[package]
name = "hyperactor"
version = "0.0.0"
authors = ["Facebook <opensource+crates-hyperactor@fb.com>"]
edition = "2024"
description = "a high-performance, scalable actor framework for cluster computing"
repository = "https://github.com/meta-pytorch/monarch/"
license = "BSD-3-Clause"

[[bin]]
name = "hyperactor_example_channel"
path = "example/channel.rs"

[[bin]]
name = "hyperactor_example_derive"
path = "example/derive.rs"

[[bin]]
name = "hyperactor_example_pingpong"
path = "example/pingpong.rs"

[[bin]]
name = "hyperactor_example_stream"
path = "example/stream.rs"

[[bin]]
name = "hyperactor_host_test_bootstrap"
path = "test/host_bootstrap.rs"

[[bench]]
name = "channel_benchmarks"
path = "benches/main.rs"

[dependencies]
algebra = { version = "0.0.0", path = "../algebra" }
anyhow = "1.0.102"
async-trait = "0.1.86"
backoff = { version = "0.4.0", features = ["futures", "tokio"] }
bincode = "1.3.3"
bytes = { version = "1.11.1", features = ["serde"] }
clap = { version = "4.6.0", features = ["derive", "env", "string", "unicode", "wrap_help"] }
dashmap = { version = "5.5.3", features = ["rayon", "serde"] }
derivative = "2.2"
dns-lookup = "1.0.8"
enum-as-inner = "0.6.1"
erased-serde = "0.4.10"
fastrand = "2.1.1"
futures = { version = "0.3.31", features = ["async-await", "compat"] }
hostname = "0.4.2"
humantime = "2.1"
hyperactor_config = { version = "0.0.0", path = "../hyperactor_config" }
hyperactor_macros = { version = "0.0.0", path = "../hyperactor_macros" }
hyperactor_telemetry = { version = "0.0.0", path = "../hyperactor_telemetry" }
indenter = "0.3.4"
inventory = "0.3.22"
local-ip-address = "0.5.7"
nix = { version = "0.30.1", features = ["dir", "event", "hostname", "inotify", "ioctl", "mman", "mount", "net", "poll", "ptrace", "reboot", "resource", "sched", "signal", "term", "time", "user", "zerocopy"] }
opentelemetry = "0.31"
paste = "1.0.14"
rand = { version = "0.9", features = ["small_rng"] }
rustls = "0.23.37"
rustls-pemfile = "2.2.0"
serde = { version = "1.0.219", features = ["derive", "rc"] }
serde_json = { version = "1.0.140", features = ["alloc", "float_roundtrip", "raw_value", "unbounded_depth"] }
serde_multipart = { version = "0.0.0", path = "../serde_multipart" }
signal-hook-tokio = { version = "0.3.1", features = ["futures-v0_3"] }
smol_str = "0.3.6"
strum = { version = "0.27.1", features = ["derive"] }
thiserror = "2.0.18"
tokio = { version = "1.50.0", features = ["full", "test-util", "tracing"] }
tokio-rustls = { version = "0.26.4", features = ["logging", "ring", "tls12"], default-features = false }
tokio-stream = { version = "0.1.18", features = ["fs", "io-util", "net", "signal", "sync", "time"] }
tokio-util = { version = "0.7.18", features = ["full"] }
tracing = { version = "0.1.41", features = ["attributes", "valuable"] }
typeuri = { version = "0.0.0", path = "../typeuri" }
unicode-ident = "1.0.24"
uuid = { version = "1.22.0", features = ["rng-getrandom", "serde", "v4", "v5", "v6", "v7", "v8"] }
wirevalue = { version = "0.0.0", path = "../wirevalue" }

[dev-dependencies]
buck-resources = "1"
criterion = { version = "0.5.1", features = ["async_tokio", "csv_output"] }
indoc = "2.0.2"
maplit = "1.0"
proptest = "1.11.0"
serde_bytes = "0.11"
tempfile = "3.27.0"
timed_test = { version = "0.0.0", path = "../timed_test" }
tokio-test = "0.4.5"
tracing-subscriber = { version = "0.3.23", features = ["chrono", "env-filter", "json", "local-time", "parking_lot", "registry"] }
tracing-test = { version = "0.2.6", features = ["no-env-filter"] }

[features]
default = []
stdio-write-probe = []

[lints]
rust = { unexpected_cfgs = { check-cfg = ["cfg(fbcode_build)"], level = "warn" } }
